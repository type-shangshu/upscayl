name: Build Installers

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux-x64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18.20.5
          cache: npm

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y elfutils rpm
          npm ci

      - name: Build Linux x64 installers
        run: npm run dist:linux-x64

      - uses: actions/upload-artifact@v4
        with:
          name: upscayl-linux-x64
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.zip
            dist/*.yml
            dist/*.blockmap

  linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18.20.5
          cache: npm

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y elfutils rpm
          npm ci

      - name: Build Linux arm64 installers
        run: npm run dist:linux-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: upscayl-linux-arm64
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.zip
            dist/*.yml
            dist/*.blockmap

  windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18.20.5
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows x64 installers
        run: npm run dist:win-x64

      - uses: actions/upload-artifact@v4
        with:
          name: upscayl-windows-x64
          path: |
            dist/*.exe
            dist/*.zip
            dist/*.yml
            dist/*.blockmap

  windows-arm64:
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows arm64 installers
        run: npm run dist:win-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: upscayl-windows-arm64
          path: |
            dist/*.exe
            dist/*.zip
            dist/*.yml
            dist/*.blockmap

  macos-arm64:
    runs-on: macos-15
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18.20.5
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS arm64 installers
        run: npm run dist:mac-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: upscayl-macos-arm64
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.yml
            dist/*.blockmap
